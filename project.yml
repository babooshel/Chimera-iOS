name: Chimera
options:
  # This tells XcodeGen to use a very old, stable project format
  xcodeVersion: "13.0" 
  deploymentTarget:
    iOS: "16.0"
targets:
  Chimera:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Chimera
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.baboo.chimera
      INFOPLIST_FILE: Chimera/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      # Force internal project compatibility
      LAST_UPGRADE_CHECK: "1300"
      # This kills the Format 77 error
      COMBINE_HIDPI_IMAGES: NO
