name: Chimera
options:
  bundleIdPrefix: com.baboo
  xcodeVersion: "13.0"
  deploymentTarget:
    iOS: "16.0"
targets:
  Chimera:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Chimera
    dependencies:
      - framework: Frameworks/MoltenVK.xcframework
      - sdk: libsqlite3.tbd
      - sdk: libz.tbd
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.baboo.chimera
      INFOPLIST_FILE: Chimera/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      LIBRARY_SEARCH_PATHS: $(inherited) $(PROJECT_DIR)/Frameworks
      OTHER_LDFLAGS: $(inherited) -lFEXCore
