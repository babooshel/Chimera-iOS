name: Chimera Cloud Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install xcodegen cmake

      - name: Unzip MoltenVK
        run: |
          ZIP_PATH=$(find . -name "MoltenVK.xcframework.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then echo "ZIP NOT FOUND"; exit 1; fi
          mkdir -p Frameworks
          unzip -o "$ZIP_PATH" -d Frameworks/
          mv Frameworks/MoltenVK.xcframework.zip_folder/MoltenVK.xcframework Frameworks/ 2>/dev/null || true

      - name: Build FEX Core (The Force Override)
        run: |
          git clone --recurse-submodules https://github.com/FEX-Emu/FEX.git
          cd FEX
          
          # This version overwrites the entire line 65 with a comment 
          # so it literally cannot trigger the error.
          sed -i '' '65s/message(FATAL_ERROR/message(STATUS/' CMakeLists.txt
          sed -i '' 's/Unsupported system type/Ignored system check/g' CMakeLists.txt
          
          mkdir Build && cd Build
          
          # Forced Toolchain variables to bypass platform logic
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DAPPLE_IOS=ON \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_TESTING=OFF \
            -DENABLE_LTO=OFF \
            -Wno-dev
          
          make -j$(sysctl -n hw.ncpu) FEXCore
          mkdir -p ../../Frameworks
          cp FEXCore/libFEXCore.a ../../Frameworks/

      - name: Assemble Chimera
        run: |
          xcodegen generate
          sed -i '' 's/objectVersion = [0-9]*/objectVersion = 54/g' Chimera.xcodeproj/project.pbxproj
          
          xcodebuild -project Chimera.xcodeproj \
                     -scheme Chimera \
                     -configuration Release \
                     -sdk iphoneos \
                     archive -archivePath Chimera.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath Chimera.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath output \
                     CODE_SIGNING_ALLOWED=NO
