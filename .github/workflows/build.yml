name: Chimera Cloud Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install xcodegen cmake

      - name: Unzip MoltenVK
        run: |
          # Finds the zip even if it's in a subfolder or root
          ZIP_PATH=$(find . -name "MoltenVK.xcframework.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then echo "ZIP NOT FOUND"; exit 1; fi
          mkdir -p Frameworks
          unzip -o "$ZIP_PATH" -d Frameworks/
          # Ensure the framework is at the expected path
          mv Frameworks/MoltenVK.xcframework.zip_folder/MoltenVK.xcframework Frameworks/ 2>/dev/null || true

      - name: Build FEX Core (The Hack)
        run: |
          git clone --recurse-submodules https://github.com/FEX-Emu/FEX.git
          cd FEX
          
          # HACK: Force-enable iOS by deleting the restriction lines
          sed -i '' '/Unsupported system type iOS/d' CMakeLists.txt
          sed -i '' '/FEX only supports Linux and Windows/d' CMakeLists.txt
          
          mkdir Build && cd Build
          # Tricking FEX into building with the iOS Toolchain
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_TESTING=OFF \
            -DENABLE_LTO=OFF \
            -DENABLE_ASSERTIONS=OFF
          
          make -j$(sysctl -n hw.ncpu) FEXCore
          mkdir -p ../../Frameworks
          cp FEXCore/libFEXCore.a ../../Frameworks/

      - name: Assemble Chimera
        run: |
          xcodegen generate
          # Ensure the project file is compatible with modern Xcode
          sed -i '' 's/objectVersion = [0-9]*/objectVersion = 54/g' Chimera.xcodeproj/project.pbxproj
          
          xcodebuild -project Chimera.xcodeproj \
                     -scheme Chimera \
                     -configuration Release \
                     -sdk iphoneos \
                     archive -archivePath Chimera.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES
