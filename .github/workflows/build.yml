name: Chimera Cloud Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install xcodegen cmake

      - name: Unzip MoltenVK
        run: |
          # Finds the zip even if it's in a subfolder or root
          ZIP_PATH=$(find . -name "MoltenVK.xcframework.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then echo "ZIP NOT FOUND"; exit 1; fi
          mkdir -p Frameworks
          unzip -o "$ZIP_PATH" -d Frameworks/
          # Ensure the framework is at the expected path
          mv Frameworks/MoltenVK.xcframework.zip_folder/MoltenVK.xcframework Frameworks/ 2>/dev/null || true

      - name: Build FEX Core (The Nuclear Option)
        run: |
          git clone --recurse-submodules https://github.com/FEX-Emu/FEX.git
          cd FEX
          
          # AGGRESSIVE HACK: Delete any line that mentions 'Unsupported' and 'iOS'
          # This cleans out the block that's stopping the build.
          sed -i '' '/Unsupported.*iOS/d' CMakeLists.txt
          sed -i '' '/FEX only supports Linux/d' CMakeLists.txt
          
          mkdir Build && cd Build
          
          # FORCE THE ISSUE: We tell FEX it's Linux, but tell the Mac it's iOS.
          # This bypasses the platform check entirely.
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DFEX_ASSERT_ON_UNKNOWN_ARCH=OFF \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_TESTING=OFF \
            -DENABLE_LTO=OFF
          
          make -j$(sysctl -n hw.ncpu) FEXCore
          mkdir -p ../../Frameworks
          cp FEXCore/libFEXCore.a ../../Frameworks/

      - name: Assemble Chimera
        run: |
          xcodegen generate
          # Ensure the project file is compatible with modern Xcode
          sed -i '' 's/objectVersion = [0-9]*/objectVersion = 54/g' Chimera.xcodeproj/project.pbxproj
          
          xcodebuild -project Chimera.xcodeproj \
                     -scheme Chimera \
                     -configuration Release \
                     -sdk iphoneos \
                     archive -archivePath Chimera.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath Chimera.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath output \
                     CODE_SIGNING_ALLOWED=NO
