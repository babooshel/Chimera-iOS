name: Chimera Cloud Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build IPA
        run: |
          # The -allowProvisioningDeviceRegistration flag helps bypass some cloud errors
          xcodebuild -project Chimera.xcodeproj \
                     -scheme Chimera \
                     -configuration Release \
                     -sdk iphoneos \
                     archive -archivePath Chimera.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath Chimera.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath output \
                     CODE_SIGNING_ALLOWED=NO
